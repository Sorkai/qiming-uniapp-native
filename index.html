<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="renderer" content="webkit" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#97b4f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="启明智教" />
  <title>启明智教</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg?v=qiming-smart-edu" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <!-- 鎬濇簮榛戜綋 (Noto Sans SC) - Google Fonts CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100..900&display=swap" rel="stylesheet">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TQ7GPZDL9X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-TQ7GPZDL9X');
  </script>
  <script>
    (function () {
      var reloadFlag = localStorage.getItem("THEME_SWITCH_RELOAD");
      if (reloadFlag === "true") {
        var targetMode = localStorage.getItem("THEME_SWITCH_MODE");
        var color = targetMode === "dark" ? "#121212" : "#ffffff";
        document.documentElement.style.background = color;
        var style = document.createElement("style");
        style.id = "theme-refresh-mask-style";
        style.innerHTML = ".loader { display: none !important; } #app { visibility: hidden !important; } body { background: " + color + " !important; } #theme-instant-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; z-index: 2147483647; background: " + color + "; opacity: 1; transition: opacity 0.5s ease; }";
        document.head.appendChild(style);
        var mask = document.createElement("div");
        mask.id = "theme-instant-mask";
        document.documentElement.appendChild(mask);
        window.addEventListener("load", function () {
          setTimeout(function () {
            mask.style.opacity = "0";
            var appStyle = document.createElement("style");
            appStyle.innerHTML = "#app { visibility: visible !important; }";
            document.head.appendChild(appStyle);
            setTimeout(function () {
              if (mask.parentNode) mask.parentNode.removeChild(mask);
              localStorage.removeItem("THEME_SWITCH_RELOAD");
              localStorage.removeItem("THEME_SWITCH_MODE");
            }, 500);
          }, 200);
        });
      }
    })();
  </script>
</head>

<body>
  <div id="app">
    <style>
      html,
      body,
      #app {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .loader,
      .loader::before,
      .loader::after {
        width: 2.5em;
        height: 2.5em;
        border-radius: 50%;
        animation: load-animation 1.8s infinite ease-in-out;
        animation-fill-mode: both;
      }

      .loader {
        position: relative;
        top: 0;
        margin: 80px auto;
        font-size: 10px;
        color: #406eeb;
        text-indent: -9999em;
        transform: translateZ(0);
        transform: translate(-50%, 0);
        animation-delay: -0.16s;
      }

      .loader::before,
      .loader::after {
        position: absolute;
        top: 0;
        content: "";
      }

      .loader::before {
        left: -3.5em;
        animation-delay: -0.32s;
      }

      .loader::after {
        left: 3.5em;
      }

      @keyframes load-animation {

        0%,
        80%,
        100% {
          box-shadow: 0 2.5em 0 -1.3em;
        }

        40% {
          box-shadow: 0 2.5em 0 0;
        }
      }
    </style>
    <div class="loader"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
