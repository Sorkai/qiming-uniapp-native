name: Validate Three Clients
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_OPTIONS: --max-old-space-size=8192

on:
  push:
    branches:
      - main
      - wechat-miniprogram
  pull_request:
    branches:
      - main
      - wechat-miniprogram

jobs:
  build:
    name: Web, App resources, and WeChat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        id: pnpm-install
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install web dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Install uni-app dependencies
        run: |
          pnpm --dir native-app --ignore-workspace install --frozen-lockfile

      - name: Lint and verify formatting
        run: |
          pnpm lint
          git diff --exit-code

      - name: Type-check web and uni-app
        run: |
          pnpm typecheck
          pnpm test:contracts
          pnpm --dir native-app type-check

      - name: Self-test device audit tooling
        run: |
          pnpm native:audit:android:self-test
          pnpm mini:real-audit:self-test
          pnpm ios-native:self-test

      - name: Build Android and iOS app resources
        run: |
          pnpm build:app-h5
          pnpm sync:app-h5
          pnpm --dir native-app build:app

      - name: Build and inspect WeChat Mini Program
        run: |
          pnpm mini:build
          pnpm mini:smoke

      - name: Build EdgeOne WeChat H5
        run: |
          pnpm --ignore-workspace edgeone:build
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
