name: Sync to CNB

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to sync
        required: true
        default: main
        type: choice
        options:
          - main
          - dev

permissions:
  contents: read

concurrency:
  group: sync-to-cnb-${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  sync-to-cnb:
    name: Sync ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}

      - name: Push branch to CNB
        uses: docker://tencentcom/git-sync
        env:
          PLUGIN_TARGET_URL: ${{ vars.CNB_REPO_URL || 'https://cnb.cool/sorkai/vue-pure-admin-max' }}
          PLUGIN_AUTH_TYPE: https
          PLUGIN_USERNAME: cnb
          PLUGIN_PASSWORD: ${{ secrets.CNB_TOKEN }}
          PLUGIN_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
          PLUGIN_FORCE: "true"
