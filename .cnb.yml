main:
  push:
    - name: Build and Deploy EdgeOne Pages (main)
      runner:
        tags: cnb:arch:amd64
        cpus: 16
      docker:
        image: node:20
        volumes:
          - /root/.local/share/pnpm/store:copy-on-write
      imports:
        - https://cnb.cool/sorkai/vue-pure-admin-max-secrets/-/blob/main/envs.yml
      stages:
        - name: Prepare pnpm
          script: |
            set -euo pipefail
            corepack enable
            corepack prepare pnpm@9 --activate
            node -v
            pnpm -v
            pnpm config set store-dir /root/.local/share/pnpm/store

        - name: Install dependencies
          script: |
            set -euo pipefail
            pnpm install --no-frozen-lockfile

        - name: Build
          script: |
            set -euo pipefail
            pnpm build

        - name: Verify build output
          script: |
            set -euo pipefail
            test -d dist
            test -f dist/index.html

        - name: Deploy to EdgeOne Pages
          script: |
            set -euo pipefail
            if [ -z "${EDGEONE_API_TOKEN:-}" ]; then
              echo "EDGEONE_API_TOKEN is not configured. Import it from a CNB secret repository before deploying." >&2
              exit 1
            fi
            npx --yes edgeone pages deploy ./dist -n aiedu -t "$EDGEONE_API_TOKEN" -e production

